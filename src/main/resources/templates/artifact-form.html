<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:action="@{/save}" th:object="${artifact}" method="post">
    <div>
        <input type="hidden" th:field="*{id}" />
    </div>
    <div>
        <label>Name:</label>
        <input type="text" th:field="*{name}" />
        <span th:if="*{name}" th:errors="*{name}" class="error"></span>
    </div>
    <div>
        <label>Origin</label>
        <input type="text" th:field="*{origin}" />
        <span th:if="*{name}" th:errors="*{name}" class="error"></span>
    </div>
    <div>
        <label>Date</label>
        <input type="date" th:field="*{date}" />
        <span th:if="*{name}" th:errors="*{name}" class="error"></span>
    </div>
    <div>
        <button type="submit">Lưu</button>
    </div>
</form>
</body>
</html>
